<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Запуск проекта | Инновационное решение</title>
    <meta name="description" content="Перейти к проекту. Современный инструмент для достижения ваших целей. Нажмите, чтобы запустить.">
    <meta name="keywords" content="проект, запуск, сервис, инновации, технология">
    
    <!-- Open Graph -->
    <meta property="og:title" content="Запуск проекта | Инновационное решение">
    <meta property="og:description" content="Перейти к проекту. Современный инструмент для достижения ваших целей.">
    <meta property="og:type" content="website">
    
    <!-- Favicon -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🚀</text></svg>">
    
    <!-- Вставьте сюда код счетчика (Google Analytics, Yandex Metrica) -->
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: #fafafa;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* Animated background circles */
        .bg-shapes {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: 0;
        }

        .bg-shapes .shape {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.4;
            animation: float 20s infinite ease-in-out;
        }

        .shape-1 {
            width: 400px;
            height: 400px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            top: -100px;
            left: -100px;
            animation-delay: 0s;
        }

        .shape-2 {
            width: 300px;
            height: 300px;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            bottom: -50px;
            right: -50px;
            animation-delay: -5s;
        }

        .shape-3 {
            width: 250px;
            height: 250px;
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            top: 50%;
            left: 60%;
            animation-delay: -10s;
        }

        @keyframes float {
            0%, 100% {
                transform: translate(0, 0) scale(1);
            }
            25% {
                transform: translate(30px, -30px) scale(1.05);
            }
            50% {
                transform: translate(-20px, 20px) scale(0.95);
            }
            75% {
                transform: translate(20px, 10px) scale(1.02);
            }
        }

        /* Main container */
        .container {
            position: relative;
            z-index: 1;
            text-align: center;
            padding: 40px 20px;
            max-width: 600px;
            width: 100%;
        }

        /* Icon */
        .icon-wrapper {
            margin-bottom: 30px;
            opacity: 0;
            transform: translateY(20px);
            animation: fadeInUp 0.8s ease-out forwards;
        }

        .icon {
            font-size: 64px;
            display: inline-block;
            animation: pulse 2s infinite ease-in-out;
        }

        @keyframes pulse {
            0%, 100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.1);
            }
        }

        @keyframes fadeInUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Heading */
        h1 {
            font-size: clamp(2rem, 5vw, 3rem);
            font-weight: 700;
            color: #1a1a1a;
            margin-bottom: 20px;
            line-height: 1.2;
            opacity: 0;
            transform: translateY(20px);
            animation: fadeInUp 0.8s ease-out 0.2s forwards;
        }

        /* Description */
        .description {
            font-size: clamp(1rem, 2.5vw, 1.25rem);
            color: #555;
            line-height: 1.6;
            margin-bottom: 40px;
            opacity: 0;
            transform: translateY(20px);
            animation: fadeInUp 0.8s ease-out 0.4s forwards;
        }

        /* Button */
        .cta-button {
            display: inline-block;
            padding: 18px 48px;
            font-size: 1.125rem;
            font-weight: 600;
            color: #fff;
            text-decoration: none;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            border-radius: 50px;
            box-shadow: 0 4px 15px rgba(26, 26, 46, 0.3);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            opacity: 0;
            transform: translateY(20px);
            animation: fadeInUp 0.8s ease-out 0.6s forwards;
        }

        .cta-button:hover {
            transform: scale(1.05) translateY(-2px);
            box-shadow: 0 8px 25px rgba(26, 26, 46, 0.4);
            background: linear-gradient(135deg, #16213e 0%, #0f3460 100%);
        }

        .cta-button:active {
            transform: scale(0.98) translateY(0);
        }

        /* Responsive */
        @media (max-width: 480px) {
            .container {
                padding: 30px 20px;
            }

            .icon {
                font-size: 48px;
            }

            .cta-button {
                padding: 16px 40px;
                font-size: 1rem;
                width: 100%;
            }
        }

        /* Reduced motion */
        @media (prefers-reduced-motion: reduce) {
            .shape,
            .icon,
            h1,
            .description,
            .cta-button {
                animation: none;
            }

            .icon-wrapper,
            h1,
            .description,
            .cta-button {
                opacity: 1;
                transform: none;
            }

            .cta-button {
                transition: none;
            }
        }
    </style>
</head>
<body>
    <!-- Background animated shapes -->
    <div class="bg-shapes">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
        <div class="shape shape-3"></div>
    </div>

    <!-- Main content -->
    <main class="container">
        <div class="icon-wrapper">
            <span class="icon">🚀</span>
        </div>
        
        <h1>Новая эра начинается здесь</h1>
        
        <p class="description">
            Откройте для себя инновационное решение, которое изменит ваш подход к работе. 
            Передовые технологии, интуитивный интерфейс и безграничные возможности ждут вас.
        </p>
        
        <a href="https://example.com" class="cta-button">Запустить</a>
    </main>
</body>
</html>
